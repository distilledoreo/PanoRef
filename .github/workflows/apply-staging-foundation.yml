name: Apply staging foundation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: staging-foundation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  implement:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/per-shot-staging-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply implementation
        run: python3 scripts/apply-per-shot-staging-foundation.py
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npm run lint
      - name: Test
        run: |
          npm test > /tmp/vitest.log 2>&1 || {
            tail -n 120 /tmp/vitest.log
            exit 1
          }
          tail -n 30 /tmp/vitest.log
      - name: Publish test failure
        if: failure()
        run: |
          cp /tmp/vitest.log /tmp/staging-test-failure.log
          git fetch origin feature/per-shot-staging-foundation
          git reset --hard origin/feature/per-shot-staging-foundation
          cp /tmp/staging-test-failure.log staging-test-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add staging-test-failure.log
          git commit -m "Record staging test failure"
          git push origin HEAD:feature/per-shot-staging-foundation
      - name: Commit verified implementation
        run: |
          rm scripts/apply-per-shot-staging-foundation.py
          rm .github/workflows/apply-staging-foundation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add per-shot staging scene foundation"
          git push origin HEAD:feature/per-shot-staging-foundation
