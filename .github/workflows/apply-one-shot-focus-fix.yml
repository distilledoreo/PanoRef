name: Apply one-shot object focus fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  patch-focus-behavior:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/focused-translate-and-human-projection
          fetch-depth: 0

      - name: Make focus requests one-shot
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workspace = Path('src/components/workspaces/BuildWorkspace.tsx')
          source = workspace.read_text()
          marker = 'Framing is a one-shot camera command'
          if marker not in source:
              anchor = '  const requestFrame = useCallback((ids: string[]) => {'
              start = source.index(anchor)
              block_end = source.index('\n\n', start)
              insertion = """

          // Framing is a one-shot camera command, not an ongoing attachment to the
          // selected objects. Clear the request after the viewport has consumed the
          // committed render so later object edits cannot recenter the orbit target.
          useEffect(() => {
            if (!frameRequest) return;
            const animationFrame = window.requestAnimationFrame(() => {
              setFrameRequest((current) => (current === frameRequest ? 0 : current));
            });
            return () => window.cancelAnimationFrame(animationFrame);
          }, [frameRequest]);"""
              source = source[:block_end] + insertion + source[block_end:]
              workspace.write_text(source)

          test_path = Path('tests/focusedTranslateAndHumanProjection.test.ts')
          tests = test_path.read_text()
          import_needle = "import { describe, expect, it } from 'vitest';\n"
          if "from 'node:fs'" not in tests:
              tests = tests.replace(
                  import_needle,
                  import_needle + "import { readFileSync } from 'node:fs';\n",
                  1,
              )
          if "describe('one-shot object focus'" not in tests:
              tests += """

          describe('one-shot object focus', () => {
            it('clears a frame request after the viewport consumes it', () => {
              const source = readFileSync(
                new URL('../src/components/workspaces/BuildWorkspace.tsx', import.meta.url),
                'utf8',
              );
              expect(source).toContain('Framing is a one-shot camera command');
              expect(source).toContain('window.requestAnimationFrame(() => {');
              expect(source).toContain(
                'setFrameRequest((current) => (current === frameRequest ? 0 : current))',
              );
            });
          });
          """
              test_path.write_text(tests)

          Path('.github/workflows/apply-one-shot-focus-fix.yml').unlink()
          PY

      - name: Commit the focused-camera fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/workspaces/BuildWorkspace.tsx tests/focusedTranslateAndHumanProjection.test.ts .github/workflows/apply-one-shot-focus-fix.yml
          git commit -m "Make object focus a one-shot camera command"
          git push origin HEAD:fix/focused-translate-and-human-projection

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
