name: Clean staging foundation diff

on:
  pull_request:
    branches:
      - main

concurrency:
  group: staging-foundation-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/per-shot-staging-foundation
          fetch-depth: 0
      - name: Restore original line endings
        run: python3 scripts/restore-staging-line-endings.py
      - name: Verify type-check
        run: |
          npm ci
          npm run lint
      - name: Commit cleanup
        run: |
          rm scripts/restore-staging-line-endings.py
          rm .github/workflows/cleanup-staging-diff.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep staging foundation diff focused"
          git push origin HEAD:feature/per-shot-staging-foundation
